<!DOCTYPE html>
<html>

<head>
    <title>VideoSDK DataStream Load Test</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { font-weight: 800; letter-spacing: -0.025em; margin-bottom: 24px; color: var(--primary); }
        h3 { font-weight: 700; margin-top: 32px; border-bottom: 2px solid var(--border); padding-bottom: 8px; width: 100%; max-width: 800px; }
        
        #grid-screen, #join-screen {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin: 20px 0;
        }
        .stat-card {
            background: #f1f5f9;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
        .stat-value { font-size: 20px; font-weight: 700; color: var(--text); margin-top: 4px; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-item {
            animation: fadeInUp 0.3s ease-out forwards;
            padding: 8px 12px;
            border-bottom: 1px solid #f1f5f9;
        }
        .msg-item:last-child { border-bottom: none; }
        
        #chatMessages, #logOutput {
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 12px;
        }

        input {
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--primary); }
        
        button {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #eff6ff;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            color: var(--primary);
            font-weight: 500;
        }
        .header-info span { color: var(--text); font-weight: 700; }
    </style>
</head>

<body>
    <h1>VideoSDK DataStream Load Test</h1>

    <!-- Shown when no meetingId/token in URL -->
    <div id="join-screen" style="display:none">
        <input type="text" id="tokenInput" placeholder="Paste Token" style="width:400px" />
        <br><br>
        <input type="text" id="meetingIdInput" placeholder="Meeting ID (leave blank to create)" />
        <input type="number" id="freqInput" placeholder="Send freq ms (optional)" />
        <br><br>
        <button onclick="handleManualJoin()">Join / Create Meeting</button>
    </div>

    <!-- Shown once in meeting -->
    <div id="grid-screen" style="display:none">
        <div class="header-info">
            <div>Status: <strong><span id="status" style="color:var(--primary)">-</span></strong></div>
            <div>Meeting ID: <span id="meetingIdDisplay">-</span></div>
            <div>Send Freq: <span id="freqDisplay">-</span></div>
            <div>Messages: <span id="showMessagesDisplay">-</span></div>
        </div>

        <h3>Live Throughput</h3>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Messages Recv/s</div>
                <div class="stat-value" id="msgPerSec">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Recv</div>
                <div class="stat-value" id="totalMsgRecv">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Bytes/s</div>
                <div class="stat-value" id="bytesPerSec">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Data</div>
                <div class="stat-value">~<span id="totalBytesRecv">0</span> B</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Participants</div>
                <div class="stat-value" id="participantCount">1</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">CPU Usage</div>
                <div class="stat-value" id="cpuUsage">-</div>
            </div>
        </div>
        <div style="margin-bottom: 20px; font-size: 13px; color: var(--text-muted);">
            Messages Sent: <strong id="totalMsgSent">0</strong>
        </div>

        <h3>Chat</h3>
        <div id="chatMessages" style="height:200px;overflow-y:scroll;border:1px solid #ccc;margin-bottom:8px;padding:4px"></div>
        <input type="text" id="chatInput" placeholder="Type a message..." />
        <button onclick="sendChatMessage()">Send</button>

        <h3>Log</h3>
        <div id="logOutput" style="height:200px;overflow-y:scroll;border:1px solid #ccc;font-family:monospace;font-size:12px;padding:4px"></div>
    </div>

    <script src="https://sdk.videosdk.live/js-sdk/0.6.0/videosdk.js"></script>
    <!-- config.js is gitignored and used for local dev only. Set window.TOKEN there. -->
    <!-- On Vercel / CI, pass ?token=... in the URL instead. -->
    <script>window.TOKEN = '';</script>
    <script src="config.js" onerror="console.info('config.js not found — using URL param token')"></script>
    <script src="index.js"></script>
</body>

</html>
